<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>GRINDX — Verify Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <style>
    .otp-wrap { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:24px 20px; }
    .otp-logo { text-align:center; margin-bottom:32px; }
    .otp-logo-txt { font-family:'Rajdhani',sans-serif; font-size:38px; font-weight:700; letter-spacing:4px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .otp-logo-sub { font-size:12px; color:var(--txt3); letter-spacing:2px; margin-top:4px; }
    .otp-card { background:var(--card); border:1px solid var(--border-lt); border-radius:var(--r); padding:24px; }
    .otp-title { font-size:22px; font-weight:700; margin-bottom:6px; text-align:center; }
    .otp-desc { font-size:13px; color:var(--txt2); text-align:center; margin-bottom:24px; }
    .otp-email { font-size:14px; font-weight:600; color:var(--primary); text-align:center; margin-bottom:20px; word-break:break-all; }
    .otp-inputs { display:flex; gap:10px; justify-content:center; margin:20px 0; }
    .otp-inputs input { width:46px; height:54px; text-align:center; font-size:22px; font-weight:700; background:var(--card-lt); border:1px solid var(--border-lt); border-radius:var(--r-xs); color:var(--txt); font-family:'Rajdhani',sans-serif; transition:border .2s; }
    .otp-inputs input:focus { border-color:var(--primary); }
    .otp-timer { text-align:center; margin-bottom:16px; }
    .otp-timer span { font-size:12px; color:var(--txt3); }
    .otp-timer b { color:var(--primary); }
    .otp-status { text-align:center; margin-top:16px; font-size:13px; }
    .otp-status.success { color:var(--success); }
    .otp-status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="otp-wrap">
    <div class="otp-logo">
      <div class="otp-logo-txt">GRINDX</div>
      <div class="otp-logo-sub"><i class="fas fa-gamepad"></i> PLAY &middot; EARN &middot; DOMINATE</div>
    </div>
    <div class="otp-card">
      <div class="otp-title">Verify Your Email</div>
      <div class="otp-desc">We sent a 6-digit code to</div>
      <div class="otp-email" id="otpEmail">—</div>

      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn btn-outline btn-full" id="sendOtpBtn"><i class="fas fa-paper-plane"></i> Send OTP</button>
      </div>

      <div class="otp-inputs" id="otpInputs">
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
        <input type="tel" maxlength="1" class="otp-digit" data-otp>
      </div>

      <div class="otp-timer">
        <span id="otpTimerText">Resend in <b id="otpCountdown">60</b>s</span>
      </div>

      <button class="btn btn-primary btn-full" id="verifyBtn" disabled><i class="fas fa-shield-check"></i> Verify & Create Account</button>

      <div class="otp-status" id="otpStatus"></div>

      <div style="text-align:center;margin-top:20px">
        <a href="index.html" style="font-size:13px;color:var(--txt3)"><i class="fas fa-arrow-left"></i> Back to Sign Up</a>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════ FIREBASE CONFIG ═══════════════
    const firebaseConfig = {
      apiKey: "AIzaSyDZ_yzyejcKkHx_6NB1gaEYfCB2fxyoeJM",
      authDomain: "grindx-officalz.firebaseapp.com",
      databaseURL: "https://grindx-officalz-default-rtdb.firebaseio.com",
      projectId: "grindx-officalz",
      storageBucket: "grindx-officalz.firebasestorage.app",
      messagingSenderId: "686976018871",
      appId: "1:686976018871:web:fe06a9ca83dbd241142032"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ─── Dynamic Backend URL from Firebase settings ──────────────────────────
    let _backendUrl = null;
    function getBackend() {
      if (_backendUrl !== null) return Promise.resolve(_backendUrl);
      return db.ref('settings/backendUrl').once('value').then(s => {
        _backendUrl = (s.val() || '').replace(/\/$/, '');
        return _backendUrl;
      });
    }

    // ═══════════════ UTILS ═══════════════
    function toast(msg, type = 'info') {
      const colors = { success: '#22c55e', error: '#f87171', info: '#60a5fa', warning: '#fbbf24' };
      Toastify({ text: msg, duration: 3000, gravity: 'top', position: 'center', style: { background: colors[type] || colors.info, color: '#000', fontWeight: '600', borderRadius: '12px', fontSize: '13px', padding: '12px 20px' } }).showToast();
    }

    // ═══════════════ STATE ═══════════════
    let otpCooldown = false;
    let otpTimer = null;
    let otpVerified = false;
    let formData = null;

    // ═══════════════ INIT ═══════════════
    function init() {
      const stored = sessionStorage.getItem('grindx_signup');
      if (!stored) {
        toast('No signup data. Please fill the form first.', 'error');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        return;
      }
      formData = JSON.parse(stored);
      document.getElementById('otpEmail').textContent = formData.email;

      // Auto-send OTP on page load
      sendOtp();
    }

    // ═══════════════ OTP HANDLERS ═══════════════
    document.getElementById('sendOtpBtn').addEventListener('click', sendOtp);

    async function sendOtp() {
      if (otpCooldown) return;
      const btn = document.getElementById('sendOtpBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';
      otpCooldown = true;
      try {
        const BACKEND = await getBackend();
        const res = await fetch(`${BACKEND}/api/otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: formData.email, action: 'send' })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Failed to send OTP');
        toast('OTP sent to your email!', 'success');
        startOtpTimer(60);
        // Focus first OTP input
        document.querySelector('.otp-digit').focus();
      } catch (e) {
        toast(e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
        otpCooldown = false;
      }
    }

    function startOtpTimer(sec) {
      let s = sec;
      const countdown = document.getElementById('otpCountdown');
      const timerText = document.getElementById('otpTimerText');
      timerText.style.display = 'block';
      countdown.textContent = s;
      document.getElementById('sendOtpBtn').disabled = true;
      document.getElementById('sendOtpBtn').innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
      if (otpTimer) clearInterval(otpTimer);
      otpTimer = setInterval(() => {
        s--;
        countdown.textContent = s;
        if (s <= 0) {
          clearInterval(otpTimer);
          otpTimer = null;
          timerText.style.display = 'none';
          document.getElementById('sendOtpBtn').disabled = false;
          otpCooldown = false;
        }
      }, 1000);
    }

    // OTP input auto-focus
    document.addEventListener('input', e => {
      if (e.target.dataset.otp) {
        if (e.target.value.length > 1) e.target.value = e.target.value.charAt(0);
        if (e.target.value && e.target.nextElementSibling) e.target.nextElementSibling.focus();
        checkOtpFilled();
      }
    });

    // OTP backspace handler
    document.addEventListener('keydown', e => {
      if (e.target.dataset.otp && e.key === 'Backspace' && !e.target.value) {
        if (e.target.previousElementSibling) {
          e.target.previousElementSibling.focus();
          e.target.previousElementSibling.value = '';
        }
      }
    });

    function checkOtpFilled() {
      const digits = [...document.querySelectorAll('.otp-digit')].map(inp => inp.value);
      document.getElementById('verifyBtn').disabled = !digits.every(d => d.length === 1);
    }

    // ═══════════════ VERIFY & CREATE ACCOUNT ═══════════════
    document.getElementById('verifyBtn').addEventListener('click', verifyAndCreate);

    async function verifyAndCreate() {
      const digits = [...document.querySelectorAll('.otp-digit')].map(inp => inp.value);
      const otp = digits.join('');
      if (otp.length !== 6) return toast('Enter 6-digit OTP', 'error');

      const btn = document.getElementById('verifyBtn');
      const status = document.getElementById('otpStatus');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verifying...';
      status.textContent = '';

      try {
        // Step 1: Verify OTP
        const BACKEND = await getBackend();
        const res = await fetch(`${BACKEND}/api/otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: formData.email, otp, action: 'verify' })
        });
        const data = await res.json();
        if (!data.verified) throw new Error(data.error || 'Invalid OTP');

        status.textContent = 'OTP verified! Creating account...';
        status.className = 'otp-status success';

        // Step 2: Create Firebase Auth account
        const cred = await auth.createUserWithEmailAndPassword(formData.email, formData.pass);
        const uid = cred.user.uid;
        const myRefCode = 'GX' + uid.slice(0, 6).toUpperCase();

        // Step 3: Handle referral
        let referredBy = null;
        if (formData.refCode) {
          const refSnap = await db.ref('users').orderByChild('myRefCode').equalTo(formData.refCode).once('value');
          if (refSnap.exists()) referredBy = Object.keys(refSnap.val())[0];
        }

        // Step 4: Get signup bonus
        const sSnap = await db.ref('settings').once('value');
        const s = sSnap.val() || {};

        // Step 5: Write user data
        await db.ref('users/' + uid).set({
          uid,
          name: `${formData.first} ${formData.last}`.trim(),
          username: formData.uname.toLowerCase(),
          email: formData.email,
          phone: formData.phone,
          profilePic: '',
          status: 'active',
          banReason: '',
          depositBal: parseFloat(s.signupBonus || 0),
          winningBal: 0,
          bonusBal: parseFloat(s.signupBonus || 0),
          totalMatches: 0,
          totalWon: 0,
          lifetimeEarnings: 0,
          myRefCode,
          referredBy,
          referrals: 0,
          referralEarnings: 0,
          referralRewarded: false,
          isAdmin: false,
          createdAt: Date.now()
        });

        // Step 6: Cleanup & redirect
        sessionStorage.removeItem('grindx_signup');
        status.textContent = 'Account created! Redirecting...';
        toast('Account created successfully!', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);

      } catch (e) {
        status.textContent = e.message;
        status.className = 'otp-status error';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-shield-check"></i> Verify & Create Account';

        // If account already exists (from OTP verify but account creation failed), try to sign in
        if (e.message.includes('already in use')) {
          status.textContent = 'Account already exists. Redirecting to login...';
          setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        }
      }
    }

    // ═══════════════ START ═══════════════
    init();
  </script>
</body>
</html>
